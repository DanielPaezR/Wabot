<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participar en {{ promocion.titulo }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f5f7fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .promo-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .promo-title { color: #c53030; font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .premio { background: linear-gradient(135deg, #ffd700, #ffb700); color: #333; padding: 15px; border-radius: 12px; font-weight: 600; margin: 15px 0; }
        .upload-area { border: 2px dashed #ccc; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #c53030; background: #fff5f5; }
        .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .preview-img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; }
        
        .participacion-card {
            background: linear-gradient(135deg, #e8f4f8 0%, #d1e9f0 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .participacion-stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.1);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #c53030; }
        .stat-label { font-size: 0.75rem; color: #666; }
        .position-badge {
            display: inline-block;
            background: #c53030;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .btn-ver { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; margin-right: 8px; }
        .btn-eliminar { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; }
        .btn-ver:hover { background: #5a67d8; }
        .btn-eliminar:hover { background: #c0392b; }
        
        .alert { border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .alert-success { background: #d1fae5; color: #065f46; border: none; }
        .alert-warning { background: #fef3c7; color: #92400e; border: none; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer" 
         data-profesional-id="{{ profesional_id }}" 
         data-promocion-id="{{ promocion.id }}"
         data-promocion-titulo="{{ promocion.titulo }}"
         data-promocion-premio="{{ promocion.premio }}"
         data-promocion-descripcion="{{ promocion.descripcion }}">
        
        <div class="promo-card">
            <div class="text-center mb-4">
                <i class="fas fa-trophy fa-3x text-warning"></i>
            </div>
            
            <h4 class="promo-title text-center" id="promoTitulo"></h4>
            
            <div class="premio text-center" id="promoPremio"></div>
            
            <p class="text-muted mt-2" id="promoDescripcion"></p>
            
            <div id="participacionStatus"></div>
            
            <div class="text-center mt-3">
                <a href="/" class="text-muted small">Volver al inicio</a>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Obtener datos desde los atributos del contenedor
        const mainContainer = document.getElementById('mainContainer');
        const promocionId = mainContainer.dataset.promocionId;
        const profesionalId = mainContainer.dataset.profesionalId;
        
        // Asignar valores a los elementos
        document.getElementById('promoTitulo').textContent = mainContainer.dataset.promocionTitulo || '';
        document.getElementById('promoPremio').innerHTML = '<i class="fas fa-gift"></i> Premio: ' + (mainContainer.dataset.promocionPremio || '');
        document.getElementById('promoDescripcion').textContent = mainContainer.dataset.promocionDescripcion || '';
        
        let participacionActual = null;
        
        // Cargar participación existente del cliente
        async function cargarParticipacion() {
            const telefono = localStorage.getItem('telefono_cliente');
            if (!telefono) {
                mostrarFormulario();
                return;
            }
            
            try {
                const response = await fetch(`/api/concurso/mi-participacion?promocion_id=${promocionId}&telefono=${telefono}`);
                const data = await response.json();
                
                if (data.success && data.participacion) {
                    participacionActual = data.participacion;
                    mostrarParticipacionExistente(data.participacion);
                } else {
                    mostrarFormulario();
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarFormulario();
            }
        }
        
        // Mostrar participación existente
        async function mostrarParticipacionExistente(participacion) {
            const container = document.getElementById('participacionStatus');
            
            try {
                const rankingResponse = await fetch(`/api/concurso/ranking/${promocionId}`);
                const rankingData = await rankingResponse.json();
                
                let posicion = '-';
                if (rankingData.success && rankingData.participaciones) {
                    const index = rankingData.participaciones.findIndex(p => p.id === participacion.id);
                    if (index !== -1) posicion = index + 1;
                }
                
                container.innerHTML = `
                    <div class="participacion-card">
                        <h5><i class="fas fa-check-circle text-success"></i> ¡Ya participaste!</h5>
                        <div class="participacion-stats">
                            <div class="stat-item">
                                <div class="stat-value" id="likesCount">${participacion.likes}</div>
                                <div class="stat-label">Votos</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${posicion}</div>
                                <div class="stat-label">Posición</div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <span class="position-badge">
                                ${posicion === 1 ? '🥇 Líder' : posicion === 2 ? '🥈 Segundo' : posicion === 3 ? '🥉 Tercero' : `${posicion}º lugar`}
                            </span>
                        </div>
                        <div class="mt-3">
                            <button class="btn-ver" onclick="verMiParticipacion()">
                                <i class="fas fa-eye"></i> Ver mi entrada
                            </button>
                            <button class="btn-eliminar" onclick="eliminarParticipacion()">
                                <i class="fas fa-trash-alt"></i> Eliminar
                            </button>
                        </div>
                        <div class="alert alert-warning mt-3">
                            <i class="fas fa-info-circle"></i> Comparte tu enlace para recibir más votos:<br>
                            <code id="shareLink" style="word-break: break-all;">${window.location.origin}/vota/${participacion.id}</code>
                            <button class="btn btn-sm btn-outline-secondary mt-2" onclick="copiarEnlace()">Copiar enlace</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error obteniendo ranking:', error);
                container.innerHTML = '<div class="alert alert-danger">Error al cargar tu participación</div>';
            }
        }
        
        // Mostrar formulario para nueva participación
        function mostrarFormulario() {
            const container = document.getElementById('participacionStatus');
            container.innerHTML = `
                <form id="formParticipar" enctype="multipart/form-data">
                    <input type="hidden" name="promocion_id" value="${promocionId}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Sube hasta 3 fotos de tu corte</label>
                        <div class="upload-area" onclick="document.getElementById('fotos').click()">
                            <i class="fas fa-camera fa-2x text-muted"></i>
                            <p class="mb-0 mt-2 text-muted">Toca para seleccionar fotos</p>
                        </div>
                        <input type="file" name="fotos" id="fotos" multiple accept="image/*" style="display: none;" onchange="previewFotos()">
                        <div class="preview-grid" id="preview"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mensaje opcional</label>
                        <textarea name="nota" class="form-control" rows="2" placeholder="Ej: ¡Me encantó mi nuevo look!"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3" id="btnSubmit">
                        <i class="fas fa-paper-plane"></i> Participar
                    </button>
                </form>
            `;
            
            const form = document.getElementById('formParticipar');
            if (form) {
                form.addEventListener('submit', enviarParticipacion);
            }
        }
        
        function previewFotos() {
            const files = document.getElementById('fotos').files;
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            
            for (let i = 0; i < Math.min(files.length, 3); i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML += `<img src="${e.target.result}" class="preview-img">`;
                };
                reader.readAsDataURL(files[i]);
            }
        }
        
        async function enviarParticipacion(e) {
            e.preventDefault();
            const files = document.getElementById('fotos').files;
            if (files.length === 0) {
                alert('Selecciona al menos una foto');
                return;
            }
            if (files.length > 3) {
                alert('Máximo 3 fotos');
                return;
            }
            
            const telefono = localStorage.getItem('telefono_cliente');
            if (!telefono) {
                alert('Primero identifícate en el chat');
                window.location.href = '/cliente/1';
                return;
            }
            
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo...';
            
            const formData = new FormData(e.target);
            formData.append('telefono', telefono);
            formData.append('nombre', localStorage.getItem('cliente_nombre') || 'Cliente');
            
            try {
                const response = await fetch('/api/concurso/participar', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ ¡Participación exitosa!');
                    cargarParticipacion();
                } else {
                    alert('❌ Error: ' + result.message);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Participar';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Participar';
            }
        }
        
        function verMiParticipacion() {
            if (participacionActual) {
                window.open(`/vota/${participacionActual.id}`, '_blank');
            }
        }
        
        async function eliminarParticipacion() {
            if (!confirm('¿Estás seguro de eliminar tu participación? Esta acción no se puede deshacer.')) return;
            
            const telefono = localStorage.getItem('telefono_cliente');
            if (!telefono) return;
            
            try {
                const response = await fetch(`/api/concurso/eliminar-participacion`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        promocion_id: parseInt(promocionId),
                        telefono: telefono
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ Participación eliminada');
                    participacionActual = null;
                    mostrarFormulario();
                } else {
                    alert('❌ Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión');
            }
        }
        
        function copiarEnlace() {
            const enlace = document.getElementById('shareLink').textContent;
            navigator.clipboard.writeText(enlace);
            alert('✅ Enlace copiado al portapapeles');
        }
        
        // Inicializar
        cargarParticipacion();
    </script>
</body>
</html>
